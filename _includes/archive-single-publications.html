{% include base_path %}

<div class="list__item" style="margin-bottom: 2.5em;">
  <article class="archive__item" itemscope itemtype="http://schema.org/CreativeWork" style="display: flex; flex-direction: row; gap: 30px; align-items: center;">
    
    <div class="archive__item-teaser" style="flex: 0 0 30%; max-width: 250px;">
      {% if post.thumbnail %}
        <a href="{{ base_path }}{{ post.url }}" rel="permalink">
          <img src="{{ base_path }}/images/{{ post.thumbnail }}" alt="Paper figure" style="width: 100%; aspect-ratio: 4 / 3; object-fit: cover; object-position: center; border: 1px solid #eaeaea; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        </a>
      {% else %}
        <div style="width: 100%; aspect-ratio: 4 / 3; background-color: #f7f7f7; border-radius: 8px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center;">
           <span style="color: #aaa; font-size: 0.8em;">No Image</span>
        </div>
      {% endif %}
    </div>

    <div class="archive__item-body" style="flex: 1;">
      
      <h3 class="archive__item-title" itemprop="headline" style="margin-top: 0; margin-bottom: 0.3em; font-size: 1.2em;">
        <a href="{{ base_path }}{{ post.url }}" rel="permalink" style="color: #2c3e50; text-decoration: none;">{{ post.title }}</a>
      </h3>
      
      <p class="archive__item-excerpt" itemprop="description" style="margin-top: 0; margin-bottom: 0.8em; font-size: 0.95em; color: #555; line-height: 1.4;">
        {{ post.citation }}<br>
        {% if post.venue %}<b><i>{{ post.venue }}</i></b>, {% endif %}
        {{ post.date | date: '%Y' }}
      </p>

      <div class="archive__item-buttons">
        <a href="{{ base_path }}{{ post.url }}" class="btn btn--info btn--small" style="font-size: 0.8em; padding: 0.3em 0.8em; margin-right: 5px;">Read More</a>
        {% if post.paperurl %}
          <a href="{{ post.paperurl }}" class="btn btn--primary btn--small" style="font-size: 0.8em; padding: 0.3em 0.8em;" target="_blank">PDF / Link</a>
        {% endif %}
      </div>
      
    </div>

  </article>
</div>
